<div class="bg-he-red text-white w-full min-h-20 px-4 py-6 sm:px-6 lg:px-8 grid grid-cols-3">
  <div class="flex justify-center">
    <div class="flex flex-col items-start">
      <a mat-button [href]="bugReportUrl" target="_blank" rel="noopener noreferrer">Bug-Tracker</a>
      <a mat-button [href]="build.commitUrl" target="_blank">Version: {{ build.version }}</a>
    </div>
  </div>

  <div class="flex justify-center">
    <div class="flex flex-col items-start">
      @for (link of links; track $index) {
      <a mat-button [href]="link['link']" target="_blank" rel="noopener noreferrer">{{
        link['name']
        }}</a>
      }
    </div>
  </div>

  <div class="flex justify-center">
    <div class="flex flex-col items-start">
    </div>
  </div>
</div>
