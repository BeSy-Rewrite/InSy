# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Build, docker & push to github packages

on:
  push:
    branches: ["main", "test", "backend", "frontend"]
    # Publish semver tags as releases.
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main", "test", "backend", "frontend"]
  workflow_dispatch:

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}
  BUILD_PROFILE: production

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Login to Github
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check build profile
        if: ${{ github.ref == 'refs/heads/test' || github.event_name == 'pull_request' }}
        run: |
          echo "BUILD_PROFILE=test" >> "${GITHUB_ENV}"

      # Update version in version.ts
      - name: Update version
        run: |
          # Get version from git tag or generate from branch and commit
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            BRANCH="${{ github.ref_name }}"
            COMMIT_SHORT=$(git rev-parse --short HEAD)
            DATE=$(date +%Y%m%d)
            VERSION="${BRANCH}-${DATE}-${COMMIT_SHORT}"
          fi

          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"

          # Update version.ts file
          echo "export const build = { version: '${VERSION}', commitUrl: '${COMMIT_URL}' };" > frontend/src/environments/version.ts
          echo "Updated version.ts to: ${VERSION}"

          # Store version for later use
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # Commit and push version changes back to repository
      - name: Commit version update
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Check if version.ts has changes
          if git diff --quiet frontend/src/environments/version.ts; then
            echo "No version changes to commit"
          else
            git add frontend/src/environments/version.ts
            git commit -m "chore: Update version to ${VERSION}" -m "[skip ci]"
            git push origin HEAD || {
              echo "Failed to push version update to repository"
              exit 1
            }
            echo "Version committed and pushed to repository"
          fi

      - name: Setup image name
        run: |
          echo "IMAGE_NAME=${REPO_OWNER@L}/insy" >> "${GITHUB_ENV}"

      - name: Build and push Frontend to GitHub
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ./frontend
          build-args: |
            PROFILE=${{ env.BUILD_PROFILE }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ env.BUILD_PROFILE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend to GitHub
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push frontend deployment image only on main branch pushes
      - name: Build and push deployment image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        id: build-and-push-deployment
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ./frontend
          build-args: |
            PROFILE=deployment
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:deployment
          cache-from: type=gha
          cache-to: type=gha,mode=max
